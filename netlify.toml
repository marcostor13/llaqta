[build]
  command = "bun run build"
  publish = "apps/web/dist/llaqta/browser"
  functions = "apps/api/src"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "serverless-http", "cors"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
