[build]
  # Usamos comandos estándar de npm para máxima compatibilidad con Netlify
  command = "npm run build"
  publish = "apps/web/dist/llaqta/browser"
  functions = "apps/api/src"

[build.environment]
  # Asegurar que no se ejecuten validaciones automáticas de Angular
  NETLIFY_SKIP_ANGULAR_RUNTIME = "true"
  DISABLE_ANGULAR_RUNTIME = "true"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/pdfkit/**"]

  [functions.index]
    external_node_modules = ["pdfkit"]
