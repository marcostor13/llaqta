[build]
  # Compilamos y copiamos el resultado a la raíz para un despliegue limpio
  command = "bun run build && mkdir -p dist && cp -r apps/web/dist/llaqta/browser dist/"
  publish = "dist/llaqta/browser"
  functions = "apps/api/src"

[build.environment]
  # Desactivar rastro de plugins automáticos
  NETLIFY_SKIP_ANGULAR_RUNTIME = "true"
  DISABLE_ANGULAR_RUNTIME = "true"
  # Asegurar entorno Bun
  NPM_FLAGS = "--version" 

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "serverless-http", "cors"]
