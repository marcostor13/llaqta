server {
    server_name smileandgo.pe www.smileandgo.pe;

    root /var/www/smileandgo.pe/b2b;
    index index.html;

    client_max_body_size 4M;  # Límite de 10MB

    location / {
        try_files $uri $uri/ /index.html?$query_string;
    }
    
    # NO cachear el entrypoint
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Opcional: no cachear manifest / version (si existen)
    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    # Flutter: archivos de bootstrap/SW nunca cacheados (cambian con cada build)
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }
    location = /version.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }
    location = /main.dart.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    # Cache largo solo para assets con hash en el nombre (fonts, images, iconos)
    location ~* \.(?:css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot|map)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    # JS genérico (canvaskit u otros) — cache corto
    location ~* \.js$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/smileandgo.pe/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/smileandgo.pe/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

