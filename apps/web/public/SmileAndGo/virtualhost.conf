map $http_origin $cors_origin {
    default                                   "";
    "~^https?://(.*\.)?smileandgo\.pe$"       "$http_origin";
    "~^https?://(.*\.)?medandgo\.pe$"         "$http_origin";
    "~^https?://localhost(:[0-9]+)?$"         "$http_origin";
    "~^https?://127\.0\.0\.1(:[0-9]+)?$"     "$http_origin";
}
server {
    root /var/www/smileandgo.pe/cdn;

    index index.html index.htm index.nginx-debian.html;
    server_name cdn.smileandgo.pe; # managed by Certbot

    autoindex off;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml;
    gzip_min_length 1024;

    location / {
	limit_except GET HEAD { deny all; }
        try_files $uri $uri/ =404;
	expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff2?)$ {

        # Responder preflight OPTIONS
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cdn.smileandgo.pe/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cdn.smileandgo.pe/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = cdn.smileandgo.pe) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 ;
    listen [::]:80 ;
    server_name cdn.smileandgo.pe;
    return 404; # managed by Certbot
}

